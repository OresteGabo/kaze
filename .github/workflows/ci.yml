name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-shared-server:
    name: Android, Shared, Server
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kaze
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kaze"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run Android, shared, and server checks
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kaze?sslmode=disable
        run: ./gradlew :composeApp:compileDebugKotlinAndroid :shared:jvmTest :server:test --no-daemon

      - name: Print failing server test details
        if: failure()
        run: |
          if [ -d server/build/test-results/test ]; then
            echo "---- server test failures ----"
            grep -R -n "<testcase\\|<failure\\|<error" server/build/test-results/test || true
          fi

      - name: Validate server distribution packaging
        env:
          KAZE_SERVER_ONLY: "true"
        run: ./gradlew :server:installDist --no-daemon

      - name: Validate server Docker image
        run: docker build -t kaze-server-ci .

  ios:
    name: iOS compile
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Compile iOS simulator target
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64 --no-daemon
