name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared:
    name: Shared tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run shared JVM tests
        run: ./gradlew :shared:jvmTest --no-daemon

  android:
    name: Android compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Compile Android target
        run: ./gradlew :composeApp:compileDebugKotlinAndroid --no-daemon

  server:
    name: Server tests and packaging
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kaze
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kaze"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Check Postgres service
        env:
          PGPASSWORD: postgres
        run: pg_isready -h localhost -p 5432 -U postgres -d kaze

      - name: Run server tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kaze?sslmode=disable
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
        run: ./gradlew :server:test --no-daemon

      - name: Print failing server test details
        if: failure()
        run: |
          if [ -d server/build/test-results/test ]; then
            echo "---- concise server test failures ----"
            find server/build/test-results/test -name '*.xml' -print0 | while IFS= read -r -d '' file; do
              perl -0ne '
                while (m{<testcase\b([^>]*)>(.*?)</testcase>}sg) {
                  my ($attrs, $body) = ($1, $2);
                  next unless $body =~ m{<(failure|error)\b([^>]*)>(.*?)</\1>}sg;
                  my ($kind, $kindAttrs, $details) = ($1, $2, $3);
                  my ($name) = $attrs =~ /name="([^"]+)"/;
                  my ($class) = $attrs =~ /classname="([^"]+)"/;
                  my ($message) = $kindAttrs =~ /message="([^"]*)"/;
                  $details =~ s/<[^>]+>//g;
                  $details =~ s/\s+/ /g;
                  $details =~ s/^ //;
                  $details =~ s/ $//;
                  print "[$kind] $class :: $name\n";
                  print "message: $message\n" if defined $message && length $message;
                  print "details: $details\n" if defined $details && length $details;
                  print "\n";
                }
              ' "$file"
            done
          fi

      - name: Upload server test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-report
          path: |
            server/build/reports/tests/test/**
            server/build/test-results/test/**
          if-no-files-found: ignore

      - name: Validate server distribution packaging
        env:
          KAZE_SERVER_ONLY: "true"
        run: ./gradlew :server:installDist --no-daemon

      - name: Validate server Docker image
        run: docker build -t kaze-server-ci .

  ios:
    name: iOS compile
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Compile iOS simulator target
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64 --no-daemon
