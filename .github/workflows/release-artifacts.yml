name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-artifact:
    name: Android artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaze-android-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  ios-framework-artifact:
    name: iOS framework artifact
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build iOS simulator framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --no-daemon

      - name: Upload iOS framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaze-ios-simulator-framework
          path: composeApp/build/bin/iosSimulatorArm64/debugFramework/*
          if-no-files-found: error

  server-artifact:
    name: Server distribution artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build server distribution
        env:
          KAZE_SERVER_ONLY: "true"
        run: ./gradlew :server:installDist --no-daemon

      - name: Upload server distribution
        uses: actions/upload-artifact@v4
        with:
          name: kaze-server-install-dist
          path: server/build/install/server/**
          if-no-files-found: error

      - name: Validate server Docker image
        run: docker build -t kaze-server-release .
