ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
}

kaze {
  database {
    driver = "org.postgresql.Driver"
    host = "localhost"
    host = ${?KAZE_DB_HOST}
    port = 5432
    port = ${?KAZE_DB_PORT}
    name = "kaze"
    name = ${?KAZE_DB_NAME}
    user = "postgres"
    user = ${?KAZE_DB_USER}
    password = "Muhirehonore@1*"
    password = ${?KAZE_DB_PASSWORD}
    maximumPoolSize = 10
    maximumPoolSize = ${?KAZE_DB_MAX_POOL_SIZE}
    # Similar to Spring's ddl-auto. Keep this as "none" in production unless
    # you intentionally want the app to manage schema creation.
    # Options: none, create, drop, create-drop
    schema {
      mode = "none"
      mode = ${?KAZE_DB_SCHEMA_MODE}
    }
  }

  security {
    # Leave empty in local development. Set KAZE_API_TOKEN in production to require
    # Authorization: Bearer <token> for /api/v1 routes.
    apiToken = ""
    apiToken = ${?KAZE_API_TOKEN}

    jwt {
      issuer = "kaze-api"
      issuer = ${?KAZE_JWT_ISSUER}
      audience = "kaze-mobile"
      audience = ${?KAZE_JWT_AUDIENCE}
      realm = "Kaze API"
      realm = ${?KAZE_JWT_REALM}
      secret = "change-this-dev-only-kaze-jwt-secret-at-least-32-chars"
      secret = ${?KAZE_JWT_SECRET}
      accessTokenTtlSeconds = 43200
      accessTokenTtlSeconds = ${?KAZE_JWT_ACCESS_TOKEN_TTL_SECONDS}
      refreshTokenTtlSeconds = 5184000
      refreshTokenTtlSeconds = ${?KAZE_JWT_REFRESH_TOKEN_TTL_SECONDS}
      oneTimeLoginTokenTtlSeconds = 120
      oneTimeLoginTokenTtlSeconds = ${?KAZE_JWT_ONE_TIME_LOGIN_TOKEN_TTL_SECONDS}
      requireForApi = false
      requireForApi = ${?KAZE_JWT_REQUIRE_FOR_API}
    }

    oauth {
      appDeepLinkRedirect = "kaze://auth/callback"
      appDeepLinkRedirect = ${?KAZE_AUTH_APP_DEEP_LINK_REDIRECT}
      googleClientIds = ""
      googleClientIds = ${?KAZE_GOOGLE_CLIENT_IDS}
      appleClientIds = ""
      appleClientIds = ${?KAZE_APPLE_CLIENT_IDS}
      google {
        clientId = ""
        clientId = ${?GOOGLE_OAUTH_CLIENT_ID}
        clientSecret = ""
        clientSecret = ${?GOOGLE_OAUTH_CLIENT_SECRET}
        redirectUri = ""
        redirectUri = ${?GOOGLE_OAUTH_REDIRECT_URI}
      }
      apple {
        clientId = ""
        clientId = ${?APPLE_SERVICE_ID}
        teamId = ""
        teamId = ${?APPLE_TEAM_ID}
        keyId = ""
        keyId = ${?APPLE_KEY_ID}
        privateKeyPem = ""
        privateKeyPem = ${?APPLE_PRIVATE_KEY_PEM}
        redirectUri = ""
        redirectUri = ${?APPLE_REDIRECT_URI}
      }
      facebook {
        appId = ""
        appId = ${?FACEBOOK_APP_ID}
        appSecret = ""
        appSecret = ${?FACEBOOK_APP_SECRET}
        redirectUri = ""
        redirectUri = ${?FACEBOOK_REDIRECT_URI}
      }
    }

    cors {
      allowedHosts = "localhost:3000,localhost:5173,127.0.0.1:3000,127.0.0.1:5173"
      allowedHosts = ${?KAZE_CORS_ALLOWED_HOSTS}
    }
  }
}
